<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#111110" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="追爱AI" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <!-- Description -->
    <meta name="description" content="AI智能恋爱助手" />

    <!-- FullCalendar CSS v5（兼容 v6，JS 注入的样式需要此基础） -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.5/main.min.css" rel="stylesheet" media="print" onload="this.media='all'" />

    <title>追爱AI</title>
    <style>
      #app-splash {
        position: fixed; inset: 0;
        background: #111110;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 99999;
        transition: opacity 0.3s ease-out;
      }
      #app-splash.hidden { opacity: 0; pointer-events: none; }
      #app-splash .logo {
        width: 80px; height: 80px;
        background: linear-gradient(135deg, #e2b044, #c17f59);
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 24px;
        animation: splash-pulse 2s ease-in-out infinite;
        box-shadow: 0 4px 24px rgba(226,176,68,0.25);
      }
      #app-splash .logo img {
        width: 52px;
        height: 52px;
        object-fit: contain;
      }
      #app-splash .logo-text {
        font-size: 32px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 4px;
        letter-spacing: 2px;
      }
      #app-splash .sub-text {
        font-size: 14px;
        color: rgba(255,255,255,0.4);
        margin-bottom: 32px;
      }
      #app-splash .dot-bounce { display: flex; gap: 8px; }
      #app-splash .dot-bounce span {
        width: 8px; height: 8px;
        background: rgba(226,176,68,0.30);
        border-radius: 50%;
        animation: dot-bounce 1.4s ease-in-out infinite both;
      }
      #app-splash .dot-bounce span:nth-child(1) { animation-delay: -0.32s; }
      #app-splash .dot-bounce span:nth-child(2) { animation-delay: -0.16s; }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes dot-bounce {
        0%, 80%, 100% { transform: scale(0); opacity: 0.2; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app-splash">
      <div class="logo">
        <img src="/logo.svg" alt="追爱AI" />
      </div>
      <div class="logo-text">追爱AI</div>
      <div class="sub-text">AI智能恋爱助手</div>
      <div class="dot-bounce">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
