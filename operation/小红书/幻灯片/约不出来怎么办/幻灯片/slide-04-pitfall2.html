<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>04 强行说服</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-warm: #FFF8F3;
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #4A4A4A;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: var(--bg-warm);
  position: relative;
  overflow: hidden;
}

.title { padding: 12px 25px 8px; text-align: center; }
.title-text { font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 800; color: var(--ink); }
.subtitle { font-size: 14px; color: var(--ink-light); margin-top: 2px; }
.divider { width: 80px; height: 3px; background: var(--coral); margin: 6px auto 0; border-radius: 2px; }

.section { margin: 10px 20px; border-radius: 14px; padding: 16px 18px; }
.bronze { background: rgba(192,57,43,0.08); border-left: 4px solid var(--coral); }
.gold { background: rgba(160,128,32,0.1); border-left: 4px solid var(--gold); }
.section-label { font-size: 13px; font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; }
.bronze .section-label { color: var(--coral); }
.gold .section-label { color: var(--gold); }
.section-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.section-text { font-size: 13px; color: var(--ink-light); font-style: italic; }

.think { margin: 14px 20px; background: #2D2D2D; border-radius: 14px; padding: 16px 18px; text-align: center; }
.think-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
.think-text { font-size: 14px; color: var(--gold); font-weight: 600; }

.footer { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.footer span { cursor: pointer; transition: transform 0.15s ease; font-size: 14px; font-weight: 700; padding: 4px 16px; border-radius: 10px; background: rgba(255,255,255,0.88); color: var(--ink); }
.footer span:active { transform: scale(0.96); }
</style>
</head>
<body>
<div class="slide">
  <div class="title">
    <div class="title-text">强行说服</div>
    <div class="subtitle">青铜 vs 王者 · 第二种错误</div>
    <div class="divider"></div>
  </div>

  <div class="section bronze">
    <div class="section-label">X 青铜</div>
    <div class="section-title">「就吃个饭而已，不耽误你很久」</div>
    <div class="section-text">强行说服她，给她压力，想通过见面证明自己</div>
  </div>

  <div class="section bronze">
    <div class="section-label">! 结果</div>
    <div class="section-title">强行推进，入她的框架</div>
    <div class="section-text">越推越远，她会觉得你在纠缠</div>
  </div>

  <div class="section gold">
    <div class="section-label">V 王者</div>
    <div class="section-title">给台阶但不纠缠</div>
    <div class="section-text">「那看时间吧，改天再约」→ 不锁死，保持可能性</div>
  </div>

  <div class="section gold">
    <div class="section-label">◆ 结果</div>
    <div class="section-title">保持框架，不把门关死</div>
    <div class="section-text">让她知道你感兴趣，但不会因为被拒绝就翻脸</div>
  </div>

  <div class="think">
    <div class="think-label">思维升级</div>
    <div class="think-text">强行说服 = 告诉她"我需要这次见面来证明自己" = 低价值</div>
  </div>

  <div class="footer">
    <span>收藏起来，聊天时对照用</span>
  </div>
</div>
</body>
</html>
