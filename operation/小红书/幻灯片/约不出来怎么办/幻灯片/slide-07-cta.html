<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>07 结尾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-warm: #FFF8F3;
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #4A4A4A;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.cover {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(192,57,43,0.15); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(192,57,43,0.2); }
.top span { color: white; font-size: 12px; font-weight: 700; letter-spacing: 4px; }

.title { padding: 20px 30px 12px; text-align: center; }
.title-text { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 800; color: white; margin-bottom: 8px; line-height: 1.2; }
.subtitle { font-size: 14px; color: rgba(255,255,255,0.6); }

.hero-quote { margin: 16px 24px; padding: 20px 24px; background: rgba(255,255,255,0.05); border-radius: 16px; border-left: 4px solid var(--coral); backdrop-filter: blur(8px); }
.quote-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-bottom: 8px; }
.quote-text { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; color: white; line-height: 1.4; }
.quote-sub { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }

.discuss-area { margin: 16px 24px 0; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 18px 20px; border: 1px solid rgba(255,255,255,0.08); flex: 1; }
.discuss-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-bottom: 10px; }
.discuss-q { font-size: 15px; color: white; line-height: 1.5; margin-bottom: 10px; }
.discuss-example { font-size: 13px; color: rgba(255,255,255,0.45); font-style: italic; padding: 10px 14px; background: rgba(255,255,255,0.04); border-radius: 8px; margin-bottom: 10px; }
.discuss-example::before { content: '例：'; color: var(--gold); font-style: normal; }
.discuss-cta { font-size: 14px; color: var(--gold); font-weight: 600; text-align: center; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }

.footer { position: absolute; bottom: 0; left: 0; right: 0; height: 110px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 26px; }
.footer-text { font-size: 15px; font-weight: 700; color: white; margin-bottom: 5px; }
.footer-note { font-size: 12px; color: rgba(255,255,255,0.45); }
</style>
</head>
<body>
<div class="cover">
  <div class="top"><span>核心认知</span></div>

  <div class="title">
    <div class="title-text">邀约不是追，是测试窗口</div>
    <div class="subtitle">她拒绝了，不代表窗口关闭，而是还没开</div>
  </div>

  <div class="hero-quote">
    <div class="quote-label">记住这句话</div>
    <div class="quote-text">她拒绝了你还继续推 = 暴露需求感 = 低价值</div>
    <div class="quote-sub">正确做法：模糊邀约 · 线上建立吸引 · 状态回调</div>
  </div>

  <div class="discuss-area">
    <div class="discuss-label">评论区等你</div>
    <div class="discuss-q">你约不出来的时候，通常怎么应对的？</div>
    <div class="discuss-example">我就直接放弃了，然后后悔...</div>
    <div class="discuss-cta">说出来，帮你分析 ↓</div>
  </div>

  <div class="footer">
    <div class="footer-text">邀约不是追，是确认她对你有没有窗口</div>
    <div class="footer-note">收藏起来，下次约不出来先对照看看</div>
  </div>
</div>
</body>
</html>
