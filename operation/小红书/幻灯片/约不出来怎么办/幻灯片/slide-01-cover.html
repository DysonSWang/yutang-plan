<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>01 封面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-warm: #FFF8F3;
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #4A4A4A;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.cover {
  width: 540px;
  height: 720px;
  background: var(--bg-warm);
  position: relative;
  overflow: hidden;
}

/* === 强视觉冲击区 === */
.hero-banner {
  width: 100%;
  height: 320px;
  background: var(--coral);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow: 0 8px 32px rgba(192,57,43,0.4);
}

.hero-banner::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 40px;
  background: var(--bg-warm);
  clip-path: ellipse(55% 100% at 50% 100%);
}

/* 约不出来 - 最醒目标签 */
.keyword-big {
  font-family: 'Noto Serif SC', serif;
  font-size: 36px;
  font-weight: 800;
  color: white;
  letter-spacing: 4px;
  background: rgba(0,0,0,0.3);
  padding: 12px 32px;
  border-radius: 12px;
  margin-bottom: 16px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  border: 3px solid white;
}

.hero-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 52px;
  font-weight: 800;
  color: white;
  letter-spacing: 2px;
  text-align: center;
  line-height: 1.1;
  text-shadow: 0 4px 16px rgba(0,0,0,0.25);
  padding: 0 24px;
}

.hero-subtitle {
  color: rgba(255,255,255,0.9);
  font-size: 16px;
  font-weight: 500;
  margin-top: 6px;
  letter-spacing: 1px;
}

/* === 内容区 === */
.content-area {
  padding: 24px 30px 20px;
}

.hook-preview {
  background: rgba(0,0,0,0.04);
  border-radius: 14px;
  padding: 14px 18px;
  border: 1px solid rgba(0,0,0,0.06);
}

.hook-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-light);
  letter-spacing: 1px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.hook-row {
  font-size: 13px;
  margin-bottom: 5px;
  line-height: 1.5;
  color: var(--ink);
}
.hook-row.her { color: var(--coral); font-weight: 600; }
.hook-row.his { color: var(--ink-light); }
.hook-end {
  text-align: center;
  font-size: 13px;
  color: var(--coral);
  font-weight: 700;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid rgba(0,0,0,0.06);
}

.divider {
  width: 60px;
  height: 2px;
  background: var(--coral);
  margin: 18px auto 0;
  border-radius: 2px;
}

/* === 底部区 === */
.footer {
  position: absolute;
  bottom: 28px;
  left: 0;
  right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.golden-rule {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.5px;
  background: rgba(255,255,255,0.95);
  padding: 5px 16px;
  border-radius: 8px;
  text-align: center;
  border: 2px solid var(--coral);
}

.cta {
  font-size: 13px;
  font-weight: 700;
  color: white;
  letter-spacing: 1px;
  background: var(--coral);
  padding: 6px 20px;
  border-radius: 20px;
  box-shadow: 0 3px 12px rgba(192,57,43,0.35);
}
</style>
</head>
<body>
<div class="cover">
  <div class="hero-banner">
    <div class="keyword-big">约不出来</div>
    <div class="hero-title">问原因<br>你就输了</div>
    <div class="hero-subtitle">第一步就错 → 窗口关闭</div>
  </div>

  <div class="content-area">
    <div class="hook-preview">
      <div class="hook-label">真实对话场景</div>
      <div class="hook-row his">你：周六一起吃饭吗？</div>
      <div class="hook-row her">她：最近有点忙…</div>
      <div class="hook-row his">你：哦…那下次吧</div>
      <div class="hook-end">→ 话题结束，窗口关闭</div>
    </div>
    <div class="divider"></div>
  </div>

  <div class="footer">
    <div class="golden-rule">邀约不是追，是确认她对你有没有窗口</div>
    <div class="cta">码住，约不出来先对照看看</div>
  </div>
</div>
</body>
</html>
