<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>05 反驳型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-warm: #FFF8F3;
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: var(--bg-warm);
  position: relative;
  overflow: hidden;
}

.title { padding: 12px 25px 8px; text-align: center; }
.title-text { font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 800; color: var(--ink); }
.subtitle { font-size: 14px; color: var(--ink-light); margin-top: 2px; }
.divider { width: 80px; height: 3px; background: var(--coral); margin: 6px auto 0; border-radius: 2px; }

.section { margin: 10px 20px; border-radius: 14px; padding: 16px 18px; }
.bronze { background: rgba(232,90,79,0.08); border-left: 4px solid var(--coral); }
.gold { background: rgba(201,162,39,0.1); border-left: 4px solid var(--gold); }
.section-label { font-size: 12px; font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; }
.bronze .section-label { color: var(--coral); }
.gold .section-label { color: var(--gold); }
.section-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.section-text { font-size: 13px; color: var(--ink-light); font-style: italic; }

.think { margin: 14px 20px; background: #2D2D2D; border-radius: 14px; padding: 16px 18px; text-align: center; }
.think-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
.think-text { font-size: 14px; color: var(--gold); font-weight: 600; }

.footer { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.footer span { cursor: pointer; transition: transform 0.15s ease; }
.footer span:active { transform: scale(0.96); }font-size: 14px; font-weight: 700; padding: 4px 16px; border-radius: 10px; background: rgba(255,255,255,0.88); color: var(--ink); }
</style>
</head>
<body>
<div class="slide">
  <div class="title">
    <div class="title-text">反驳型</div>
    <div class="subtitle">青铜 vs 王者 · 第三种错误</div>
    <div class="divider"></div>
  </div>

  <div class="section bronze">
    <div class="section-label">X 青铜</div>
    <div class="section-title">「你怎么会这么想？我不是这样的人」</div>
    <div class="section-text">反驳她的问题，试图改变她的想法</div>
  </div>

  <div class="section bronze">
    <div class="section-label">! 结果</div>
    <div class="section-title">被她的问题带跑</div>
    <div class="section-text">越描越黑，她觉得你在心虚</div>
  </div>

  <div class="section gold">
    <div class="section-label">V 王者</div>
    <div class="section-title">幽默转移，绕过问题</div>
    <div class="section-text">「怎么，想给我介绍对象？」→ 话题直接带跑</div>
  </div>

  <div class="section gold">
    <div class="section-label">◆ 结果</div>
    <div class="section-title">不纠缠，不解释</div>
    <div class="section-text">用幽默化解，她拿你没办法</div>
  </div>

  <div class="think">
    <div class="think-label">思维升级</div>
    <div class="think-text">反驳 = 被她的问题带走 = 你进了她的框架</div>
  </div>

  <div class="footer">
    <span>收藏起来，废测来袭时对照用</span>
  </div>
</div>
</body>
</html>
