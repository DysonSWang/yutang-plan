<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>02 场景钩子</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #E74C3C;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #F39C12;
  --green: #27AE60;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(231,76,60,0.15); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(231,76,60,0.25); }
.top span { color: white; font-size: 14px; font-weight: 700; letter-spacing: 2px; }

.title { padding: 16px 30px 12px; text-align: center; }
.title-text { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 800; color: white; margin-bottom: 6px; }
.subtitle { font-size: 15px; color: rgba(255,255,255,0.6); }

.card { margin: 10px 24px; background: rgba(255,255,255,0.06); border-radius: 14px; padding: 16px 18px; }
.card-label { font-size: 15px; font-weight: 700; color: var(--coral); margin-bottom: 8px; letter-spacing: 1px; }
.card-text { font-size: 16px; color: white; line-height: 1.5; margin-bottom: 6px; }
.card-wrong { border-left: 4px solid var(--coral); }

.tag-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 24px; margin-top: 8px; }
.tag { font-size: 14px; padding: 5px 12px; border-radius: 20px; font-weight: 600; }
.tag-wrong { background: rgba(231,76,60,0.3); color: white; }
.tag-note { font-size: 15px; color: rgba(255,255,255,0.6); text-align: center; margin-top: 12px; padding: 0 24px; }
</style>
</head>
<body>
<div class="slide">
  <div class="top"><span>她问「你是不是对谁都这样」是在审问你吗？</span></div>

  <div class="title">
    <div class="title-text">3种错误回应</div>
    <div class="subtitle">每一种都暴露了同一个问题：你在证明自己</div>
  </div>

  <div class="card card-wrong">
    <div class="card-label">X 方式1 · 认真解释</div>
    <div class="card-text">「不是啊，我只对你特别」</div>
    <div class="tag-row">
      <span class="tag tag-wrong">越解释越低价值</span>
      <span class="tag tag-wrong">需要她来认证</span>
    </div>
  </div>

  <div class="card card-wrong">
    <div class="card-label">X 方式2 · 否认型</div>
    <div class="card-text">「怎么会呢，我只对你一个人」</div>
    <div class="tag-row">
      <span class="tag tag-wrong">你在证明自己</span>
      <span class="tag tag-wrong">进了她的框架</span>
    </div>
  </div>

  <div class="card card-wrong">
    <div class="card-label">X 方式3 · 反驳型</div>
    <div class="card-text">「你怎么会这么想？我不是这样的人」</div>
    <div class="tag-row">
      <span class="tag tag-wrong">被问题带走</span>
      <span class="tag tag-wrong">越描越黑</span>
    </div>
  </div>

  <div class="tag-note">她不是在审问你，是在测试你有没有标准。</div>
</div>
</body>
</html>
