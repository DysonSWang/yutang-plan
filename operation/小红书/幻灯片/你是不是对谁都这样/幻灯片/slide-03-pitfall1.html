<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>03 认真解释</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #E74C3C;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #F39C12;
  --green: #27AE60;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(231,76,60,0.15); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(231,76,60,0.25); }
.top span { color: white; font-size: 15px; font-weight: 700; letter-spacing: 2px; }

.header { padding: 14px 28px 10px; text-align: center; }
.header-title { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 800; color: white; }
.header-sub { font-size: 15px; color: rgba(255,255,255,0.5); margin-top: 3px; }

.section { margin: 10px 22px; border-radius: 14px; padding: 16px 18px; }
.bronze { background: rgba(255,255,255,0.05); border-left: 5px solid rgba(231,76,60,0.7); }
.king { background: rgba(255,255,255,0.05); border-left: 5px solid rgba(39,174,96,0.7); }
.section-label { font-size: 14px; font-weight: 700; margin-bottom: 7px; letter-spacing: 1px; }
.bronze .section-label { color: var(--coral); }
.king .section-label { color: var(--green); }
.section-title { font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700; color: white; margin-bottom: 5px; }
.section-text { font-size: 15px; color: rgba(255,255,255,0.65); line-height: 1.5; }

.think { margin: 12px 22px 0; padding: 14px 18px; background: rgba(255,255,255,0.05); border-radius: 12px; text-align: center; }
.think-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 5px; }
.think-text { font-size: 15px; color: var(--gold); font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <div class="top"><span>第一种错误：认真解释</span></div>

  <div class="header">
    <div class="header-title">青铜 vs 王者</div>
    <div class="header-sub">越解释越像在心虚</div>
  </div>

  <div class="section bronze">
    <div class="section-label">X 青铜</div>
    <div class="section-title">「不是啊，我只对你特别」</div>
    <div class="section-text">认真回答她的问题，试图让她相信你</div>
  </div>

  <div class="section bronze">
    <div class="section-label">! 结果</div>
    <div class="section-title">越解释越低价值</div>
    <div class="section-text">她觉得你在证明自己，需要她来认证</div>
  </div>

  <div class="section king">
    <div class="section-label">V 王者</div>
    <div class="section-title">调侃绕过，不正面回答</div>
    <div class="section-text">「我只对好看的人这样」→ 幽默化解，不进框架</div>
  </div>

  <div class="section king">
    <div class="section-label">◆ 结果</div>
    <div class="section-title">不解释 = 有框架 = 高价值</div>
    <div class="section-text">她反而会觉得你有标准，不是一般人</div>
  </div>

  <div class="think">
    <div class="think-label">思维升级</div>
    <div class="think-text">认真解释 = 告诉她"我需要你相信我" = 低价值</div>
  </div>
</div>
</body>
</html>
