<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>07 结尾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #E74C3C;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #F39C12;
  --green: #27AE60;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.cover {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(231,76,60,0.18); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(231,76,60,0.28); }
.top span { color: white; font-size: 15px; font-weight: 700; letter-spacing: 4px; }

.title { padding: 22px 30px 14px; text-align: center; }
.title-text { font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 800; color: white; margin-bottom: 8px; line-height: 1.3; }
.subtitle { font-size: 16px; color: rgba(255,255,255,0.6); }

.hero-quote { margin: 16px 24px; padding: 22px 26px; background: rgba(255,255,255,0.05); border-radius: 16px; border-left: 5px solid var(--coral); backdrop-filter: blur(8px); }
.quote-label { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.45); letter-spacing: 1px; margin-bottom: 10px; }
.quote-text { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 800; color: white; line-height: 1.4; }
.quote-sub { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 10px; }

.discuss-area { margin: 16px 24px 0; background: rgba(255,255,255,0.04); border-radius: 14px; padding: 20px 22px; border: 1px solid rgba(255,255,255,0.08); flex: 1; }
.discuss-label { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.45); letter-spacing: 1px; margin-bottom: 12px; }
.discuss-q { font-size: 16px; color: white; line-height: 1.6; margin-bottom: 12px; }
.discuss-example { font-size: 14px; color: rgba(255,255,255,0.5); font-style: italic; padding: 12px 16px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 12px; }
.discuss-example::before { content: '例：'; color: var(--gold); font-style: normal; }
.discuss-cta { font-size: 15px; color: var(--gold); font-weight: 700; text-align: center; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); }

.footer { position: absolute; bottom: 0; left: 0; right: 0; height: 120px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 28px; }
.footer-text { font-size: 17px; font-weight: 700; color: white; margin-bottom: 6px; }
.footer-note { font-size: 13px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="cover">
  <div class="top"><span>核心认知</span></div>

  <div class="title">
    <div class="title-text">这不是审问，是废物测试</div>
    <div class="subtitle">她在测试你有没有标准，不是在审问你</div>
  </div>

  <div class="hero-quote">
    <div class="quote-label">记住这句话</div>
    <div class="quote-text">不解释 = 有框架 = 高价值</div>
    <div class="quote-sub">正确做法：调侃绕过 · 反问回踢 · 幽默转移</div>
  </div>

  <div class="discuss-area">
    <div class="discuss-label">评论区等你</div>
    <div class="discuss-q">她问过你「你是不是对谁都这样」这个问题吗？你当时怎么回的？</div>
    <div class="discuss-example">我先说：我当时直接慌了，然后解释一堆...</div>
    <div class="discuss-cta">说出来，帮你分析 ↓</div>
  </div>

  <div class="footer">
    <div class="footer-text">◆ 不解释 = 有框架 = 高价值</div>
    <div class="footer-note">收藏起来，下次遇到废测先对照看看</div>
  </div>
</div>
</body>
</html>
