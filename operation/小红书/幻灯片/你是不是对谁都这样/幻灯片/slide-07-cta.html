<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>07 结尾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-warm: #FFF8F3;
  --coral: #E85A4F;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #C9A227;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.cover {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
.top span { color: white; font-size: 14px; font-weight: 600; letter-spacing: 3px; }

.title { padding: 16px 30px 12px; text-align: center; }
.title-text { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 800; color: white; margin-bottom: 6px; }
.subtitle { font-size: 14px; color: rgba(255,255,255,0.6); }

.card { margin: 10px 24px; background: rgba(255,255,255,0.06); border-radius: 14px; padding: 16px 18px; backdrop-filter: blur(10px); }
.card-label { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 6px; letter-spacing: 1px; }
.card-text { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.5; margin-bottom: 4px; }
.card-1 { border-left: 3px solid rgba(61,140,64,0.5); }
.card-2 { border-left: 3px solid rgba(201,162,39,0.5); }
.card-3 { border-left: 3px solid rgba(232,90,79,0.5); }

.tag-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 24px; margin-top: 6px; }
.tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
.tag-green { background: rgba(61,140,64,0.2); color: var(--green); }
.tag-gold { background: rgba(201,162,39,0.2); color: var(--gold); }
.tag-coral { background: rgba(232,90,79,0.2); color: var(--coral); }

.note { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; margin-top: 12px; padding: 0 24px; }

.footer { position: absolute; bottom: 0; left: 0; right: 0; height: 120px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 28px; }
.footer-text { font-size: 15px; font-weight: 700; color: white; margin-bottom: 6px; }
.footer-note { font-size: 12px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="cover">
  <div class="top"><span>核心认知</span></div>

  <div class="title">
    <div class="title-text">这不是审问，是废物测试</div>
    <div class="subtitle">她在测试你有没有标准，不是在审问你</div>
  </div>

  <div class="card card-1">
    <div class="card-label">✅ 调侃绕过</div>
    <div class="card-text">「我只对好看的人这样」→ 不进框架</div>
    <div class="tag-row">
      <span class="tag tag-green">幽默</span>
      <span class="tag tag-green">不解释</span>
    </div>
  </div>

  <div class="card card-2">
    <div class="card-label">✅ 反问回踢</div>
    <div class="card-text">「你觉得呢？」→ 把球踢回去</div>
    <div class="tag-row">
      <span class="tag tag-gold">框架</span>
      <span class="tag tag-gold">主导</span>
    </div>
  </div>

  <div class="card card-3">
    <div class="card-label">✅ 幽默转移</div>
    <div class="card-text">「怎么，想给我介绍对象？」→ 话题带跑</div>
    <div class="tag-row">
      <span class="tag tag-coral">不纠缠</span>
      <span class="tag tag-coral">轻松</span>
    </div>
  </div>

  <div class="note">她问过你这个问题吗？你当时怎么回的？评论区说说 👇</div>

  <div class="footer">
    <div class="footer-text">👑 不解释 = 有框架 = 高价值</div>
    <div class="footer-note">收藏起来，下次遇到废测先对照看看</div>
  </div>
</div>
</body>
</html>
