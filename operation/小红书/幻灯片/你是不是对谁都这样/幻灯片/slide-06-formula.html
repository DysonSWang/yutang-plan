<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>06 正确回应</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #E74C3C;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #F39C12;
  --green: #27AE60;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(39,174,96,0.15); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(39,174,96,0.25); }
.top span { color: white; font-size: 15px; font-weight: 700; letter-spacing: 2px; }

.header { padding: 14px 28px 10px; text-align: center; }
.header-title { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 800; color: white; }
.header-sub { font-size: 15px; color: rgba(255,255,255,0.5); margin-top: 3px; }

.block { margin: 10px 22px; border-radius: 14px; padding: 16px 18px; background: rgba(39,174,96,0.1); border-left: 5px solid var(--green); }
.block-label { font-size: 14px; font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; color: var(--green); }
.block-title { font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700; color: white; margin-bottom: 5px; }
.block-text { font-size: 15px; color: rgba(255,255,255,0.65); line-height: 1.5; }

.bonus { margin: 10px 22px; border-radius: 14px; padding: 14px 18px; background: rgba(243,156,18,0.1); border-left: 5px solid var(--gold); }
.bonus-label { font-size: 14px; font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; color: var(--gold); }
.bonus-text { font-size: 15px; color: white; line-height: 1.5; }

.think { margin: 12px 22px 0; padding: 14px 18px; background: rgba(255,255,255,0.05); border-radius: 12px; text-align: center; }
.think-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 5px; }
.think-text { font-size: 15px; color: var(--gold); font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <div class="top"><span>正确回应方式</span></div>

  <div class="header">
    <div class="header-title">3种正确回应</div>
    <div class="header-sub">她问"你是不是对谁都这样"？答对她会倒追</div>
  </div>

  <div class="block">
    <div class="block-label">V 方式一：调侃绕过</div>
    <div class="block-title">把问题幽默化解</div>
    <div class="block-text">「我只对好看的人这样」→ 幽默化解，不进框架</div>
  </div>

  <div class="block">
    <div class="block-label">V 方式二：反问回踢</div>
    <div class="block-title">把球踢回去</div>
    <div class="block-text">「你觉得呢？」→ 让她进你的框架</div>
  </div>

  <div class="block">
    <div class="block-label">V 方式三：幽默转移</div>
    <div class="block-title">话题直接带跑</div>
    <div class="block-text">「怎么，想给我介绍对象？」→ 话题直接带跑</div>
  </div>

  <div class="bonus">
    <div class="bonus-label">进阶 · 她继续追问</div>
    <div class="bonus-text">不要解释，用调侃保持框架 → 「你今天问题好多啊」</div>
  </div>

  <div class="think">
    <div class="think-label">思维升级</div>
    <div class="think-text">她在测试你有没有标准，不是在审问你</div>
  </div>
</div>
</body>
</html>
