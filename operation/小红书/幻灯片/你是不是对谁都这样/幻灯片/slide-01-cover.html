<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>01 封面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #E74C3C;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #F39C12;
  --green: #27AE60;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.cover {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top-bar { width: 100%; height: 56px; background: rgba(231,76,60,0.18); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(231,76,60,0.28); }
.top-bar span { color: white; font-size: 15px; font-weight: 700; letter-spacing: 2px; }

.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 30px; }

.question { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 10px; text-align: center; }

.title { font-family: 'Noto Serif SC', serif; font-size: 42px; font-weight: 800; color: white; text-align: center; margin-bottom: 8px; line-height: 1.2; }
.title-red { color: var(--coral); }

.levels { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 16px 0; }
.level { display: flex; align-items: center; gap: 5px; font-size: 15px; color: rgba(255,255,255,0.6); }
.level-bronze { color: rgba(231,76,60,0.8); }
.level-silver { color: rgba(255,255,255,0.5); }
.level-gold { color: var(--gold); }

.hook-box { background: rgba(255,255,255,0.06); border-radius: 14px; padding: 16px 20px; margin: 10px 24px; width: calc(100% - 48px); }
.hook-line { font-size: 15px; margin-bottom: 5px; color: rgba(255,255,255,0.7); line-height: 1.5; }
.hook-line.her { color: white; }
.hook-line.his { color: rgba(255,255,255,0.5); }
.hook-line.end { color: rgba(231,76,60,0.9); font-weight: 700; margin-top: 10px; text-align: center; }

.subtitle { font-size: 15px; color: rgba(255,255,255,0.5); text-align: center; margin: 12px 0; }

.footer { height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.footer-rule { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
.footer-tag { font-size: 13px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="cover">
  <div class="top-bar"><span>⚠️ 废物测试</span></div>

  <div class="main">
    <div class="question">她问"你是不是对谁都这样"</div>
    <div class="title">答错你就<span class="title-red">完了</span></div>

    <div class="levels">
      <span class="level level-bronze">青铜 ✕</span>
      <span class="level level-silver">白银 ✓</span>
      <span class="level level-gold">王者 ✓✓</span>
    </div>

    <div class="hook-box">
      <div class="hook-line her">她：你是不是对谁都这样？</div>
      <div class="hook-line his">你：不是啊，我只对你...</div>
      <div class="hook-line her">她：哦（已读不回）</div>
      <div class="hook-line end">→ 越解释越像在心虚</div>
    </div>

    <div class="subtitle">实战聊天诊断</div>
  </div>

  <div class="footer">
    <div class="footer-rule">◆ 这不是审问，是测试</div>
    <div class="footer-tag">#聊天诊断 #废物测试 #追爱AI</div>
  </div>
</div>
</body>
</html>
