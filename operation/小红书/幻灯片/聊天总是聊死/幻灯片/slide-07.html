<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>07_万能公式_CTA</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.cover { width: 540px; height: 720px; background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%); position: relative; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border-radius: 8px; }
.c7-top { width: 100%; height: 70px; background: linear-gradient(135deg, #30d158 0%, #34c759 100%); display: flex; align-items: center; justify-content: center; }
.c7-top span { color: #fff; font-size: 22px; font-weight: 700; }
.c7-formulas { padding: 25px 20px; }
.c7-formula { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.c7-formula-num { width: 40px; height: 40px; background: #30d158; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.c7-formula-num span { color: #fff; font-size: 14px; font-weight: 700; }
.c7-formula-text { font-size: 18px; font-weight: 600; color: #fff; }
.c7-question { margin: 10px 20px; background: #1e1e2e; border-radius: 12px; padding: 24px; text-align: center; }
.c7-question-main { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.c7-question-sub { font-size: 14px; color: #8e8e93; }
.c7-footer { position: absolute; bottom: 0; left: 0; right: 0; height: 160px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 30px; }
.c7-collect { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 10px; }
.c7-action { font-size: 16px; font-weight: 600; color: #30d158; }
</style>
</head>
<body>
<div class="cover">
  <div class="c7-top"><span>📌 万能回复公式</span></div>
  <div class="c7-formulas">
    <div class="c7-formula">
      <div class="c7-formula-num"><span>1</span></div>
      <div class="c7-formula-text">状态 + 好奇 → 引发回复</div>
    </div>
    <div class="c7-formula">
      <div class="c7-formula-num"><span>2</span></div>
      <div class="c7-formula-text">推拉 + 情绪 → 制造波动</div>
    </div>
    <div class="c7-formula">
      <div class="c7-formula-num"><span>3</span></div>
      <div class="c7-formula-text">筛选 + 台阶 → 推进关系</div>
    </div>
  </div>
  <div class="c7-question">
    <div class="c7-question-main">你在聊天中踩过哪个坑？</div>
    <div class="c7-question-sub">评论区说说，帮你分析</div>
  </div>
  <div class="c7-footer">
    <div class="c7-collect">收藏起来，聊天时对照用</div>
    <div class="c7-action">👍 点赞 + 评论"思维" 领完整版</div>
  </div>
</div>
</body>
</html>
