<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>06 推拉连招</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-warm: #FFF8F3;
  --coral: #E85A4F;
  --coral-light: rgba(232, 90, 79, 0.1);
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #C9A227;
  --green: #3D8C40;
  --green-light: rgba(61, 140, 64, 0.1);
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: var(--bg-warm);
  position: relative;
  overflow: hidden;
}

.tag { width: 100%; height: 48px; background: var(--green); display: flex; align-items: center; padding: 0 22px; box-shadow: 0 4px 16px rgba(61,140,64,0.2); }
.tag span { color: white; font-size: 15px; font-weight: 600; letter-spacing: 2px; }

.title { padding: 20px 25px 10px; text-align: center; }
.title-text { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 800; color: var(--ink); }
.subtitle { font-size: 14px; color: var(--ink-light); margin-top: 4px; }
.divider { width: 80px; height: 3px; background: var(--green); margin: 10px auto 0; border-radius: 2px; }

.pushpull { margin: 10px 20px; border-radius: 14px; padding: 16px 18px; }
.push { background: var(--coral-light); border-left: 4px solid var(--coral); }
.pull { background: var(--green-light); border-left: 4px solid var(--green); }

.pp-label { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.push .pp-label { color: var(--coral); }
.pull .pp-label { color: var(--green); }

.pp-action { font-size: 14px; color: var(--ink); margin-bottom: 4px; }
.pp-example { font-size: 14px; color: var(--ink-light); font-style: italic; }

.effect { margin: 14px 20px; background: var(--gold); border-radius: 14px; padding: 16px 18px; text-align: center; }
.effect span { font-size: 15px; font-weight: 700; color: white; }

.ryan-quote { margin: 14px 20px; background: #2D2D2D; border-radius: 14px; padding: 14px 18px; text-align: center; }
.ryan-quote span { font-size: 13px; color: var(--gold); font-weight: 600; line-height: 1.4; }

.footer { position: absolute; bottom: 0; left: 0; right: 0; height: 40px; display: flex; align-items: center; justify-content: center; }
.footer span { font-size: 12px; color: var(--ink-light); }
</style>
</head>
<body>
<div class="slide">
  <div class="tag"><span>进阶 · 推拉连招</span></div>

  <div class="title">
    <div class="title-text">情绪波动神器：推拉连招</div>
    <div class="subtitle">先推后拉，让她情绪起伏</div>
    <div class="divider"></div>
  </div>

  <div class="pushpull push">
    <div class="pp-label">推：</div>
    <div class="pp-action">你先调侃她一下</div>
    <div class="pp-example">"你这品味有点独特啊"</div>
  </div>

  <div class="pushpull pull">
    <div class="pp-label">拉：</div>
    <div class="pp-action">再给她一个甜枣</div>
    <div class="pp-example">"不过还挺适合你的"</div>
  </div>

  <div class="effect">
    <span>效果：让她哭笑不得，越来越上头</span>
  </div>

  <div class="ryan-quote">
    <span>翻车过：推拉用得太生硬，对方觉得在装<br>不是技巧问题，是心态还没转过来</span>
  </div>

  <div class="footer"><span>学会这招，聊天不再平淡</span></div>
</div>
</body>
</html>
