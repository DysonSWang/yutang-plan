<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>03 坑1 查户口</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-warm: #FFF8F3;
  --coral: #C0392B;
  --coral-light: rgba(232, 90, 79, 0.1);
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #A08020;
  --green: #3D8C40;
  --green-light: rgba(61, 140, 64, 0.1);
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: var(--bg-warm);
  position: relative;
  overflow: hidden;
}

.tag { width: 100%; height: 48px; background: var(--coral); display: flex; align-items: center; padding: 0 22px; box-shadow: 0 4px 16px rgba(232,90,79,0.2); }
.tag span { color: white; font-size: 15px; font-weight: 600; letter-spacing: 2px; }

.title { padding: 28px 25px 14px; text-align: center; }
.title-text { font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 800; color: var(--ink); }
.divider { width: 80px; height: 3px; background: var(--coral); margin: 12px auto 0; border-radius: 2px; }

.section { margin: 10px 20px; border-radius: 14px; padding: 16px 18px; }
.bronze { background: var(--coral-light); border-left: 4px solid var(--coral); }
.gold { background: var(--green-light); border-left: 4px solid var(--green); }

.label { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.bronze .label { color: var(--coral); }
.gold .label { color: var(--green); }

.content { font-size: 15px; color: var(--ink); line-height: 1.55; }

.think { margin: 14px 20px; background: #2D2D2D; border-radius: 14px; padding: 16px 18px; }
.think-title { font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 10px; letter-spacing: 1px; }
.think-bad, .think-good { font-size: 13px; margin-bottom: 6px; line-height: 1.4; }
.think-bad { color: #ff8a8a; }
.think-good { color: #7DD97D; }

.footer { position: absolute; bottom: 30px; left: 0; right: 0; text-align: center; }
.footer span { cursor: pointer; transition: transform 0.15s ease; }
.footer span:active { transform: scale(0.96); }font-size: 15px; color: var(--ink); font-weight: 700; background: rgba(255,255,255,0.85); padding: 4px 16px; border-radius: 10px; }
</style>
</head>
<body>
<div class="slide">
  <div class="tag"><span>坑1 · 查户口式提问</span></div>

  <div class="title">
    <div class="title-text">查户口式提问</div>
    <div class="divider"></div>
  </div>

  <div class="section bronze">
    <div class="label">X 青铜操作</div>
    <div class="content">在干嘛？吃了吗？睡了吗？工作累吗？工资多少？</div>
  </div>

  <div class="section gold">
    <div class="label">V 王者操作</div>
    <div class="content">先分享自己，再自然地问：<br>"刚开完会差点累瘫，你呢，下班了吗？"</div>
  </div>

  <div class="think">
    <div class="think-title">💡 思维提炼</div>
    <div class="think-bad">X 不断提问像审讯，压力大</div>
    <div class="think-good">V 我的体会：聊天像打乒乓球，你一拍我一拍才能一直聊下去</div>
  </div>

  <div class="footer"><span>收藏起来，下次避免踩坑</span></div>
</div>
</body>
</html>
