<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>02 场景钩子</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-warm: #FFF8F3;
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 40%, #16213e 100%);
  position: relative;
  overflow: hidden;
}

.header { width: 100%; height: 56px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(192,57,43,0.3); }
.header span { color: white; font-size: 17px; font-weight: 600; letter-spacing: 2px; }

/* Chat hook */
.chat-hook { margin: 16px 20px 8px; background: rgba(255,255,255,0.06); border-radius: 14px; padding: 14px 18px; backdrop-filter: blur(10px); }
.chat-row { display: flex; margin-bottom: 6px; }
.chat-row:last-child { margin-bottom: 0; }
.chat-row.him { justify-content: flex-start; }
.chat-row.her { justify-content: flex-end; }
.bubble { max-width: 70%; padding: 8px 14px; border-radius: 12px; font-size: 14px; }
.bubble.him { background: rgba(192,57,43,0.15); color: #ff8a80; border-bottom-left-radius: 4px; }
.bubble.her { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border-bottom-right-radius: 4px; }
.chat-end { text-align: center; font-size: 12px; color: var(--coral); font-weight: 700; margin-top: 8px; }

/* Pitfall cards */
.pitfalls { padding: 8px 22px; }
.pitfall { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 12px 16px; margin-bottom: 10px; border-left: 3px solid var(--coral); }
.pitfall-label { font-size: 13px; font-weight: 700; color: var(--coral); margin-bottom: 4px; letter-spacing: 1px; }
.pitfall-title { font-size: 14px; font-weight: 600; color: white; margin-bottom: 2px; }
.pitfall-desc { font-size: 12px; color: rgba(255,255,255,0.75); }

.footer { position: absolute; bottom: 30px; left: 0; right: 0; text-align: center; }
.footer span { cursor: pointer; transition: transform 0.15s ease; }
.footer span:active { transform: scale(0.96); }color: var(--coral); font-size: 16px; font-weight: 600; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="slide">
  <div class="header"><span>你是不是也这样聊死过？</span></div>

  <div class="chat-hook">
    <div class="chat-row him">
      <div class="bubble him">他：在吗？你是做什么的？</div>
    </div>
    <div class="chat-row him">
      <div class="bubble him">他：多大了？你家是哪里的？</div>
    </div>
    <div class="chat-row her">
      <div class="bubble her">她：...</div>
    </div>
    <div class="chat-end">→ 话题结束</div>
  </div>

  <div class="pitfalls">
    <div class="pitfall">
      <div class="pitfall-label">X 坑1</div>
      <div class="pitfall-title">查户口式提问</div>
      <div class="pitfall-desc">像在审讯，不是聊天</div>
    </div>
    <div class="pitfall">
      <div class="pitfall-label">X 坑2</div>
      <div class="pitfall-title">秒回强迫症</div>
      <div class="pitfall-desc">暴露太闲 + 需求感</div>
    </div>
    <div class="pitfall">
      <div class="pitfall-label">X 坑3</div>
      <div class="pitfall-title">假性聊天</div>
      <div class="pitfall-desc">每天早安晚安，没推进关系</div>
    </div>
  </div>

  <div class="footer"><span>想改变？往下看 ↓</span></div>
</div>
</body>
</html>
