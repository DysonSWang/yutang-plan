<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>06_推拉连招</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.cover { width: 540px; height: 720px; background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%); position: relative; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border-radius: 8px; }
.c6-header { width: 100%; height: 60px; background: linear-gradient(135deg, #30d158 0%, #34c759 100%); display: flex; align-items: center; justify-content: center; }
.c6-header span { color: #fff; font-size: 18px; font-weight: 600; }
.c6-content { padding: 25px 20px; }
.c6-block { border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.c6-push { background: rgba(255,59,48,0.1); border-left: 4px solid #ff3b30; }
.c6-pull { background: rgba(48,209,88,0.1); border-left: 4px solid #30d158; }
.c6-label { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
.c6-push .c6-label { color: #ff3b30; }
.c6-pull .c6-label { color: #30d158; }
.c6-desc { font-size: 18px; color: #fff; margin-bottom: 6px; }
.c6-example { font-size: 14px; color: #8e8e93; font-style: italic; }
.c6-result { background: rgba(255,204,0,0.15); border-radius: 12px; padding: 20px; text-align: center; border-left: 4px solid #ffcc00; }
.c6-result span { font-size: 18px; font-weight: 600; color: #fff; }
.c6-footer { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; align-items: center; justify-content: center; }
.c6-footer span { color: #30d158; font-size: 20px; font-weight: 700; }
</style>
</head>
<body>
<div class="cover">
  <div class="c6-header"><span>情绪波动神器：推拉连招</span></div>
  <div class="c6-content">
    <div class="c6-block c6-push">
      <div class="c6-label">推：</div>
      <div class="c6-desc">你先嫌弃她一下</div>
      <div class="c6-example">"你怎么这么笨"</div>
    </div>
    <div class="c6-block c6-pull">
      <div class="c6-label">拉：</div>
      <div class="c6-desc">再给她一个甜枣</div>
      <div class="c6-example">"但笨蛋很可爱啊"</div>
    </div>
    <div class="c6-result">
      <span>效果：让她哭笑不得，越来越上头</span>
    </div>
  </div>
  <div class="c6-footer"><span>学会这招，聊天不再平淡</span></div>
</div>
</body>
</html>
