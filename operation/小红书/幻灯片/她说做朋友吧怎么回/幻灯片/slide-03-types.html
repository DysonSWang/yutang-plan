<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>03 本质</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #E74C3C;
  --gold: #F39C12;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 0;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 60px; background: rgba(231,76,60,0.2); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(231,76,60,0.35); }
.top span { color: white; font-size: 18px; font-weight: 700; letter-spacing: 3px; }

.content { flex: 1; padding: 20px 28px; display: flex; flex-direction: column; }

.title { font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 800; color: white; text-align: center; margin-bottom: 18px; line-height: 1.3; }
.title-red { color: var(--coral); }

.insight-box { background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.25); border-radius: 14px; padding: 16px 20px; margin-bottom: 16px; text-align: center; }
.insight-label { font-size: 14px; font-weight: 700; color: var(--coral); margin-bottom: 8px; }
.insight-text { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; color: white; line-height: 1.4; }

.leak-title { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 14px; }

.leak-list { list-style: none; }
.leak-item { font-size: 15px; color: rgba(255,255,255,0.85); line-height: 1.5; margin-bottom: 12px; padding-left: 4px; }
.leak-item .moment { color: white; font-weight: 600; }
.leak-item .tag { font-size: 13px; color: rgba(255,255,255,0.45); margin-left: 6px; }

.formula { background: rgba(243,156,18,0.1); border-radius: 12px; padding: 16px 20px; margin-top: auto; text-align: center; }
.formula-text { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
.formula-sub { font-size: 15px; color: rgba(255,255,255,0.5); margin-top: 8px; }

.footer { height: 56px; display: flex; align-items: center; justify-content: center; }
.footer-text { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="slide">
  <div class="top"><span>聊天诊断</span></div>

  <div class="content">
    <div class="title">朋友卡的<span class="title-red">真正原因</span></div>

    <div class="insight-box">
      <div class="insight-label">核心诊断</div>
      <div class="insight-text">她识别到了你的需求感</div>
    </div>

    <div class="leak-title">在她发出"做朋友吧"之前，你已经暴露了：</div>

    <ul class="leak-list">
      <li class="leak-item">
        <span class="moment">她隔3小时回你两个字，你30秒就回了</span><span class="tag">→ 焦虑</span>
      </li>
      <li class="leak-item">
        <span class="moment">消息发出去没回复，你每5分钟打开看一次</span><span class="tag">→ 不安</span>
      </li>
      <li class="leak-item">
        <span class="moment">聊天记录往上翻，全是你开头、你找话题</span><span class="tag">→ 单向</span>
      </li>
      <li class="leak-item">
        <span class="moment">她说"好无聊"，你立刻放下手里的事去陪她</span><span class="tag">→ 随叫随到</span>
      </li>
      <li class="leak-item">
        <span class="moment">你从不对她说"不"，怕她觉得你不够好</span><span class="tag">→ 讨好</span>
      </li>
    </ul>

    <div class="formula">
      <div class="formula-text">吸引力 = 价值感 − 需求感</div>
      <div class="formula-sub">需求感越高，吸引力越低。她看到的不是"他喜欢我"，是"他需要我"</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">◆ 你喜欢她可以，但你不能需要她</div>
  </div>
</div>
</body>
</html>
