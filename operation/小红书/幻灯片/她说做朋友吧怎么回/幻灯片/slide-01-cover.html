<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>01 封面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #C0392B;
  --gold: #A08020;
  --ink: #2D2D2D;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 0;
}

.cover {
  width: 540px;
  height: 720px;
  background: #FFF8F3;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* 珊瑚红 Banner 撑满上方 */
.banner {
  width: 100%;
  background: var(--coral);
  padding: 40px 32px 50px;
  clip-path: ellipse(60% 100% at 50% 100%);
  text-align: center;
  position: relative;
  z-index: 1;
}

.banner-tag {
  font-size: 15px;
  font-weight: 700;
  color: rgba(255,255,255,0.8);
  letter-spacing: 6px;
  margin-bottom: 18px;
  text-transform: uppercase;
}

.banner-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 48px;
  font-weight: 800;
  color: white;
  line-height: 1.25;
  letter-spacing: 2px;
}

.banner-sub {
  font-size: 18px;
  color: rgba(255,255,255,0.85);
  margin-top: 12px;
  font-weight: 500;
}

/* 白底区域 */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 32px 0;
  position: relative;
  z-index: 2;
  margin-top: -10px;
}

/* 三种错误预览 */
.levels {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 14px;
}

.level {
  font-size: 17px;
  font-weight: 700;
  padding: 6px 16px;
  border-radius: 20px;
}

.level-bad {
  background: rgba(192,57,43,0.1);
  color: var(--coral);
}

.level-good {
  background: rgba(160,128,32,0.12);
  color: var(--gold);
}

/* 对话预览 */
.hook-box {
  background: rgba(192,57,43,0.04);
  border: 1px solid rgba(192,57,43,0.1);
  border-radius: 14px;
  padding: 16px 20px;
  width: 100%;
}

.hook-line {
  font-size: 16px;
  margin-bottom: 6px;
  color: var(--ink);
  line-height: 1.6;
}

.hook-line.her {
  color: #555;
  font-weight: 500;
}

.hook-line.her strong {
  color: var(--ink);
  font-weight: 700;
}

.hook-line.end {
  color: var(--coral);
  font-weight: 800;
  font-size: 17px;
  text-align: center;
  margin-top: 10px;
  margin-bottom: 0;
}

/* 副标题 */
.subtitle {
  font-size: 16px;
  color: #888;
  text-align: center;
  margin-top: 14px;
  font-weight: 500;
}

/* 底部 */
.bottom {
  padding: 16px 32px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.bottom-rule {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 1px;
}

.bottom-cta {
  background: var(--coral);
  color: white;
  font-size: 17px;
  font-weight: 700;
  padding: 10px 36px;
  border-radius: 24px;
  letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="cover">
  <div class="banner">
    <div class="banner-tag">聊天诊断</div>
    <div class="banner-title">她说"做朋友吧"</div>
    <div class="banner-sub">你的回复决定了你是高位还是低位</div>
  </div>

  <div class="main">
    <div class="levels">
      <span class="level level-bad">挽留 ✕</span>
      <span class="level level-bad">接受 ✕</span>
      <span class="level level-good">反打 ✓</span>
    </div>

    <div class="hook-box">
      <div class="hook-line her"><strong>她：</strong>我觉得我们还是做朋友吧</div>
      <div class="hook-line her"><strong>你：</strong>为什么？我哪里不好？</div>
      <div class="hook-line her"><strong>你：</strong>我可以改...</div>
      <div class="hook-line end">→ 她更坚定了</div>
    </div>

    <div class="subtitle">实战聊天诊断 · 第9期</div>
  </div>

  <div class="bottom">
    <div class="bottom-rule">◆ 朋友卡不是终点，你的反应才是</div>
    <div class="bottom-cta">别这样回</div>
  </div>
</div>
</body>
</html>
