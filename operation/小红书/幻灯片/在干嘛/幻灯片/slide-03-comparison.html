<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>03 对比分析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(192,57,43,0.12); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(192,57,43,0.18); }
.top span { color: white; font-size: 13px; font-weight: 700; letter-spacing: 2px; }

.header { padding: 14px 24px 8px; text-align: center; }
.header-title { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 800; color: white; margin-bottom: 4px; }
.header-sub { font-size: 13px; color: rgba(255,255,255,0.5); }

.card { margin: 0 20px 10px; border-radius: 14px; padding: 14px 16px; }
.card-bronze { background: rgba(255,255,255,0.05); border-left: 4px solid rgba(192,57,43,0.6); }
.card-king { background: rgba(255,255,255,0.05); border-left: 4px solid var(--green); }

.card-label { font-size: 12px; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
.card-bronze .card-label { color: rgba(192,57,43,0.9); }
.card-king .card-label { color: var(--green); }

.flow { margin-bottom: 6px; }
.chat-row { display: flex; margin-bottom: 4px; }
.chat-row.her { justify-content: flex-start; }
.chat-row.his { justify-content: flex-end; }
.bubble { max-width: 75%; padding: 6px 12px; border-radius: 10px; font-size: 13px; }
.bubble.her { background: rgba(192,57,43,0.2); color: white; border-bottom-left-radius: 4px; }
.bubble.his { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); border-bottom-right-radius: 4px; }
.result { font-size: 12px; font-weight: 600; margin-top: 6px; text-align: center; }
.card-bronze .result { color: rgba(192,57,43,0.8); }
.card-king .result { color: var(--green); }

.think { margin: 8px 20px 0; padding: 12px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
.think-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; letter-spacing: 1px; }
.think-bad, .think-good { font-size: 13px; margin-bottom: 4px; }
.think-bad { color: rgba(255,120,120,0.9); }
.think-good { color: rgba(125,217,125,0.9); }

.footer { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 22px; }
.footer span { font-size: 13px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="slide">
  <div class="top"><span>为什么不能直接回答？</span></div>

  <div class="header">
    <div class="header-title">青铜 vs 王者 操作对比</div>
    <div class="header-sub">同样是回答，差别在哪里？</div>
  </div>

  <div class="card card-bronze">
    <div class="card-label">X 青铜操作</div>
    <div class="flow">
      <div class="chat-row her"><div class="bubble her">她：在干嘛？</div></div>
      <div class="chat-row his"><div class="bubble his">你：在上班啊，你呢？</div></div>
      <div class="chat-row her"><div class="bubble her">她：哦</div></div>
    </div>
    <div class="result">→ 话题结束</div>
  </div>

  <div class="card card-king">
    <div class="card-label">V 王者操作</div>
    <div class="flow">
      <div class="chat-row her"><div class="bubble her">她：在干嘛？</div></div>
      <div class="chat-row his"><div class="bubble his">你：刚开完会，头都大了，你今天呢？</div></div>
      <div class="chat-row her"><div class="bubble her">她：哈哈怎么了？</div></div>
    </div>
    <div class="result">→ 话题继续</div>
  </div>

  <div class="think">
    <div class="think-label">核心逻辑</div>
    <div class="think-bad">X 直接回答 = 审问式聊天，她压力大</div>
    <div class="think-good">V 状态+好奇 = 有来有往，她更愿回应</div>
  </div>

  <div class="footer">
    <span>收藏起来，下次避免踩坑</span>
  </div>
</div>
</body>
</html>
