<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>04 万能公式</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(61,140,64,0.2); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(61,140,64,0.3); }
.top span { color: white; font-size: 13px; font-weight: 700; letter-spacing: 2px; }

.header { padding: 14px 24px 8px; text-align: center; }
.header-title { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 800; color: white; margin-bottom: 4px; }
.header-sub { font-size: 13px; color: rgba(255,255,255,0.5); }

.formula { margin: 6px 20px; background: rgba(201,162,39,0.12); border-radius: 14px; padding: 14px 18px; border-left: 4px solid var(--gold); }
.formula-title { font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 6px; letter-spacing: 1px; }
.formula-content { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; color: white; }
.formula-steps { display: flex; gap: 6px; margin-top: 8px; }
.step { background: rgba(255,255,255,0.06); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 600; }

.examples { margin: 6px 20px; }
.example-box { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; border-left: 3px solid var(--green); }
.example-num { font-size: 11px; font-weight: 700; color: var(--green); margin-bottom: 4px; letter-spacing: 1px; }
.example-text { font-size: 13px; color: white; }

.think { margin: 6px 20px 0; padding: 12px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
.think-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; letter-spacing: 1px; }
.think-row { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 4px; line-height: 1.4; }

.footer { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 22px; }
.footer span { font-size: 13px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="slide">
  <div class="top"><span>万能公式</span></div>

  <div class="header">
    <div class="header-title">王者是怎么回答的？</div>
    <div class="header-sub">状态 + 感受 + 好奇 → 引发回复</div>
  </div>

  <div class="formula">
    <div class="formula-title">📌 万能公式</div>
    <div class="formula-content">状态 + 感受 + 好奇</div>
    <div class="formula-steps">
      <div class="step">① 状态</div>
      <div class="step">② 感受</div>
      <div class="step">③ 好奇</div>
    </div>
  </div>

  <div class="examples">
    <div class="example-box">
      <div class="example-num">示范 1</div>
      <div class="example-text">"刚开完会，头都大了，你今天怎么样？"</div>
    </div>
    <div class="example-box">
      <div class="example-num">示范 2</div>
      <div class="example-text">"在准备一个惊喜，你猜是什么？"</div>
    </div>
    <div class="example-box">
      <div class="example-num">示范 3</div>
      <div class="example-text">"无聊中，正好你来了，有什么好玩的事吗？"</div>
    </div>
  </div>

  <div class="think">
    <div class="think-label">背后的逻辑</div>
    <div class="think-row">先给状态 → 让她知道你在做什么</div>
    <div class="think-row">加感受 → 让她有情绪共鸣</div>
    <div class="think-row">抛好奇 → 让她有话可接</div>
  </div>

  <div class="footer">
    <span>收藏起来，聊天直接用</span>
  </div>
</div>
</body>
</html>
