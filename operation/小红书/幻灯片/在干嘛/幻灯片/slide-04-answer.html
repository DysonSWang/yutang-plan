<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>04 万能公式</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-warm: #FFF8F3;
  --coral: #C0392B;
  --coral-light: rgba(232, 90, 79, 0.1);
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #A08020;
  --green: #3D8C40;
  --green-light: rgba(61, 140, 64, 0.1);
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: var(--bg-warm);
  position: relative;
  overflow: hidden;
}

.tag { width: 100%; height: 48px; background: var(--green); display: flex; align-items: center; padding: 0 22px; box-shadow: 0 4px 16px rgba(61,140,64,0.2); }
.tag span { color: white; font-size: 15px; font-weight: 600; letter-spacing: 2px; }

.title { padding: 26px 25px 12px; text-align: center; }
.title-text { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 800; color: var(--ink); }
.divider { width: 80px; height: 3px; background: var(--green); margin: 10px auto 0; border-radius: 2px; }

.formula { margin: 10px 20px; background: rgba(201,162,39,0.12); border-radius: 14px; padding: 14px 18px; border-left: 4px solid var(--gold); }
.formula-title { font-size: 14px; font-weight: 700; color: var(--gold); margin-bottom: 6px; letter-spacing: 1px; }
.formula-content { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; color: var(--ink); }
.formula-steps { display: flex; gap: 6px; margin-top: 6px; }
.step { background: rgba(201,162,39,0.08); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: var(--ink-light); font-weight: 600; }

.examples { margin: 10px 20px; }
.example-box { background: white; border-radius: 12px; padding: 12px 18px; margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.example-num { font-size: 11px; font-weight: 700; color: var(--green); margin-bottom: 4px; letter-spacing: 1px; }
.example-text { font-size: 14px; color: var(--ink); }

.think { margin: 10px 20px; background: #2D2D2D; border-radius: 14px; padding: 14px 18px; }
.think-title { font-size: 13px; font-weight: 700; color: var(--gold); margin-bottom: 8px; letter-spacing: 1px; }
.think-row { font-size: 13px; color: rgba(255,255,255,0.85); margin-bottom: 4px; line-height: 1.4; }
.think-row:last-child { margin-bottom: 0; }

.footer { position: absolute; bottom: 30px; left: 0; right: 0; text-align: center; }
.footer span { cursor: pointer; transition: transform 0.15s ease; }
.footer span:active { transform: scale(0.96); }font-size: 15px; color: var(--ink); font-weight: 700; background: rgba(255,255,255,0.85); padding: 4px 16px; border-radius: 10px; }
</style>
</head>
<body>
<div class="slide">
  <div class="tag"><span>万能公式</span></div>

  <div class="title">
    <div class="title-text">王者是怎么回答的？</div>
    <div class="divider"></div>
  </div>

  <div class="formula">
    <div class="formula-title">📌 万能公式</div>
    <div class="formula-content">状态 + 感受 + 好奇 → 引发回复</div>
    <div class="formula-steps">
      <div class="step">① 状态</div>
      <div class="step">② 感受</div>
      <div class="step">③ 好奇</div>
    </div>
  </div>

  <div class="examples">
    <div class="example-box">
      <div class="example-num">示范 1</div>
      <div class="example-text">"刚开完会，头都大了，你今天怎么样？"</div>
    </div>
    <div class="example-box">
      <div class="example-num">示范 2</div>
      <div class="example-text">"在准备一个惊喜，你猜是什么？"</div>
    </div>
    <div class="example-box">
      <div class="example-num">示范 3</div>
      <div class="example-text">"无聊中，正好你来了，有什么好玩的事吗？"</div>
    </div>
  </div>

  <div class="think">
    <div class="think-title">💡 背后的逻辑</div>
    <div class="think-row">先给状态 → 让她知道你在做什么</div>
    <div class="think-row">加感受 → 让她有情绪共鸣</div>
    <div class="think-row">抛好奇 → 让她有话可接</div>
  </div>

  <div class="footer"><span>收藏起来，聊天直接用</span></div>
</div>
</body>
</html>
