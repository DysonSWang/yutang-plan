<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>06 进阶技巧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(61,140,64,0.2); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(61,140,64,0.3); }
.top span { color: white; font-size: 13px; font-weight: 700; letter-spacing: 2px; }

.header { padding: 14px 24px 10px; text-align: center; }
.header-title { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 800; color: white; margin-bottom: 4px; }
.header-sub { font-size: 13px; color: rgba(255,255,255,0.5); }

.block { margin: 6px 20px; border-radius: 12px; padding: 14px 16px; background: rgba(255,255,255,0.05); border-left: 3px solid var(--green); }
.block-label { font-size: 11px; font-weight: 700; color: var(--green); margin-bottom: 6px; letter-spacing: 1px; }
.block-title { font-size: 15px; font-weight: 700; color: white; margin-bottom: 4px; }
.block-example { font-size: 13px; color: rgba(255,255,255,0.6); font-style: italic; }

.think { margin: 10px 20px 0; padding: 12px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); text-align: center; }
.think-text { font-size: 13px; color: var(--gold); font-weight: 600; line-height: 1.5; }

.footer { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 22px; }
.footer span { font-size: 13px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="slide">
  <div class="top"><span>进阶技巧</span></div>

  <div class="header">
    <div class="header-title">从回答到主导</div>
    <div class="header-sub">3个进阶技巧，让聊天节奏由你掌控</div>
  </div>

  <div class="block">
    <div class="block-label">💡 技巧1</div>
    <div class="block-title">反客为主</div>
    <div class="block-example">"你猜我在干嘛？" / "不告诉你"</div>
  </div>

  <div class="block">
    <div class="block-label">💡 技巧2</div>
    <div class="block-title">情绪引导</div>
    <div class="block-example">"刚被一个问题难住了，帮我想想？"</div>
  </div>

  <div class="block">
    <div class="block-label">💡 技巧3</div>
    <div class="block-title">制造默契</div>
    <div class="block-example">"正准备给你发消息，你就来了，太巧了吧"</div>
  </div>

  <div class="think">
    <div class="think-text">我的体会：太快的满足不真实，让她追逐真实的东西</div>
  </div>

  <div class="footer">
    <span>收藏起来，聊天直接用</span>
  </div>
</div>
</body>
</html>
