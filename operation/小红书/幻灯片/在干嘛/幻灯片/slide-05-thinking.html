<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>05 思维提炼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(201,162,39,0.2); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(201,162,39,0.3); }
.top span { color: white; font-size: 13px; font-weight: 700; letter-spacing: 2px; }

.header { padding: 14px 24px 10px; text-align: center; }
.header-title { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 800; color: white; }

.item { display: flex; align-items: flex-start; gap: 12px; margin: 0 20px 12px; }
.item-num { width: 28px; height: 28px; background: rgba(192,57,43,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.item-num span { color: white; font-size: 13px; font-weight: 700; }
.item-num.gold-bg { background: rgba(201,162,39,0.25); }
.item-content { flex: 1; }
.item-title { font-size: 14px; font-weight: 700; color: white; margin-bottom: 4px; }
.item-desc { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.4; }

.think { margin: 8px 20px 0; padding: 12px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); }
.think-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; letter-spacing: 1px; }
.think-row { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 4px; line-height: 1.4; }
.think-row:last-child { margin-bottom: 0; }

.footer { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 22px; }
.footer span { font-size: 13px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="slide">
  <div class="top"><span>思维提炼</span></div>

  <div class="header">
    <div class="header-title">回复背后的3个逻辑</div>
  </div>

  <div class="item">
    <div class="item-num"><span>1</span></div>
    <div class="item-content">
      <div class="item-title">不要审问，要互动</div>
      <div class="item-desc">不断提问像审讯机，压力巨大</div>
    </div>
  </div>

  <div class="item">
    <div class="item-num"><span>2</span></div>
    <div class="item-content">
      <div class="item-title">给状态 = 分享欲</div>
      <div class="item-desc">先分享自己在做什么，对方才有话题接</div>
    </div>
  </div>

  <div class="item">
    <div class="item-num gold-bg"><span>3</span></div>
    <div class="item-content">
      <div class="item-title">抛好奇 = 给话口</div>
      <div class="item-desc">让她知道问什么、怎么回</div>
    </div>
  </div>

  <div class="think">
    <div class="think-label">我踩过坑</div>
    <div class="think-row">第一次用这个公式，对方回了个表情包</div>
    <div class="think-row">我当场不会接了……但这不是公式的问题</div>
    <div class="think-row">是心态没转过来</div>
  </div>

  <div class="footer">
    <span>记住这个逻辑，受用终身</span>
  </div>
</div>
</body>
</html>
