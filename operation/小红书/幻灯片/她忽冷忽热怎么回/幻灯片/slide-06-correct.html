<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>06 正确应对</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #E74C3C;
  --gold: #F39C12;
  --green: #27AE60;
}

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 60px; background: rgba(39,174,96,0.18); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(39,174,96,0.28); }
.top span { color: white; font-size: 18px; font-weight: 700; letter-spacing: 2px; }

.header { padding: 16px 28px 12px; text-align: center; }
.header-title { font-family: 'Noto Serif SC', serif; font-size: 32px; font-weight: 800; color: white; }
.header-sub { font-size: 17px; color: rgba(255,255,255,0.5); margin-top: 6px; }

.block { margin: 8px 22px; border-radius: 12px; padding: 14px 18px; background: rgba(39,174,96,0.1); border-left: 5px solid var(--green); }
.block-label { font-size: 16px; font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; color: var(--green); }
.block-title { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; color: white; margin-bottom: 5px; }
.block-text { font-size: 16px; color: rgba(255,255,255,0.7); line-height: 1.5; }

.bonus { margin: 12px 22px; border-radius: 12px; padding: 14px 18px; background: rgba(243,156,18,0.1); border-left: 5px solid var(--gold); }
.bonus-label { font-size: 16px; font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; color: var(--gold); }
.bonus-text { font-size: 18px; color: white; line-height: 1.5; font-weight: 600; }
</style>
</head>
<body>
<div class="slide">
  <div class="top"><span>正确应对方式</span></div>

  <div class="header">
    <div class="header-title">3种正确应对</div>
    <div class="header-sub">让她知道你不是鱼</div>
  </div>

  <div class="block">
    <div class="block-label">V 方式一：正常节奏</div>
    <div class="block-title">她冷你就慢，她热你就快</div>
    <div class="block-text">不追问、不赌气 → 保持自己节奏，让她来追你</div>
  </div>

  <div class="block">
    <div class="block-label">V 方式二：小步探测</div>
    <div class="block-title">不确定就测试，不猜</div>
    <div class="block-text">「这周有个展，一起去看看？」→ 探测窗口大小</div>
  </div>

  <div class="block">
    <div class="block-label">V 方式三：情绪脱钩</div>
    <div class="block-title">她的情绪是她自己的事</div>
    <div class="block-text">「我最近也忙我的」→ 她的忽冷忽热不绑架你</div>
  </div>

  <div class="bonus">
    <div class="bonus-label">关键认知</div>
    <div class="bonus-text">你不是她的鱼，你是选择者 → 她忽冷忽热，你稳如泰山</div>
  </div>
</div>
</body>
</html>
