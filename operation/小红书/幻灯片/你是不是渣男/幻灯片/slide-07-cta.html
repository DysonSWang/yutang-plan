<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>07 CTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto Serif+SC:wght@400;600;700;800&family=Noto Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-warm: #FFF8F3;
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: var(--bg-warm);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.label-bar {
  height: 40px;
  background: var(--coral);
  display: flex;
  align-items: center;
  justify-content: center;
}
.label-bar span {
  font-size: 13px;
  font-weight: 700;
  color: white;
  letter-spacing: 2px;
}

.main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 30px; }
.core-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--coral);
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.core-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--ink);
  text-align: center;
  margin-bottom: 8px;
}
.core-sub {
  font-size: 15px;
  color: var(--ink-light);
  text-align: center;
  margin-bottom: 24px;
}

.divider {
  width: 80px;
  height: 3px;
  background: var(--coral);
  margin: 0 auto 24px;
  border-radius: 2px;
}

.quote-box {
  background: rgba(192,57,43,0.06);
  border-radius: 14px;
  padding: 18px 22px;
  margin: 0 24px;
  border-left: 4px solid var(--coral);
  width: calc(100% - 48px);
}
.quote-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--coral);
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.quote-text {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.6;
  font-weight: 600;
}

.discuss {
  margin: 20px 24px 0;
  background: rgba(255,255,255,0.8);
  border-radius: 14px;
  padding: 18px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.discuss-q {
  font-size: 13px;
  color: var(--ink-light);
  margin-bottom: 10px;
}
.discuss-answer {
  font-size: 13px;
  color: var(--ink);
  background: rgba(61,140,64,0.08);
  border-radius: 10px;
  padding: 12px 14px;
  border-left: 3px solid var(--green);
  line-height: 1.5;
}
.discuss-hint {
  font-size: 12px;
  color: var(--ink-light);
  margin-top: 10px;
  text-align: center;
}

.footer {
  height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: linear-gradient(to top, rgba(0,0,0,0.04), transparent);
}
.footer span {
  font-size: 13px;
  color: var(--ink-light);
}
</style>
</head>
<body>
<div class="slide">
  <div class="label-bar"><span>核心认知</span></div>

  <div class="main">
    <div class="core-label">CORE</div>
    <div class="core-title">不解释 = 不证明<br>= 有框架 = 高价值</div>
    <div class="core-sub">废物测试测的不是你有没有问题，而是你稳不稳</div>

    <div class="divider"></div>

    <div class="quote-box">
      <div class="quote-label">金句</div>
      <div class="quote-text">她问"你是不是渣男"，不是在好奇答案，是在测试你：会不会急着解释，会不会跟着她的问题走，有没有自己的框架和底线。</div>
    </div>
  </div>

  <div class="discuss">
    <div class="discuss-q">她问"你是不是渣男"，你通常怎么回？</div>
    <div class="discuss-answer">我先说：我就反问一句"你觉得呢"，然后看她怎么说...</div>
    <div class="discuss-hint">说出来，帮你分析 ↓</div>
  </div>

  <div class="footer">
    <span>收藏起来，下次遇到废测先对照看看</span>
  </div>
</div>
</body>
</html>
