<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>05 讨好型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto Serif+SC:wght@400;600;700;800&family=Noto Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --coral: #C0392B;
  --ink: #2D2D2D;
  --ink-light: #6B6B6B;
  --gold: #A08020;
  --green: #3D8C40;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.slide {
  width: 540px;
  height: 720px;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.top { width: 100%; height: 56px; background: rgba(192,57,43,0.12); display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(192,57,43,0.18); }
.top span { color: white; font-size: 13px; font-weight: 700; letter-spacing: 2px; }

.header { padding: 14px 24px 8px; }
.header-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-bottom: 2px; }
.header-title { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 800; color: white; }

.card { margin: 0 20px 10px; border-radius: 14px; padding: 14px 16px; }
.card-wrong { background: rgba(255,255,255,0.05); border-left: 4px solid rgba(192,57,43,0.6); }
.card-right { background: rgba(255,255,255,0.05); border-left: 4px solid rgba(61,140,64,0.6); }

.card-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 8px; margin-bottom: 6px; letter-spacing: 0.5px; }
.badge-wrong { background: rgba(192,57,43,0.22); color: white; }
.badge-right { background: rgba(61,140,64,0.35); color: white; }

.card-title { font-size: 15px; font-weight: 700; color: white; margin-bottom: 5px; }
.card-text { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.55; margin-bottom: 6px; }

.card-result { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
.result-icon { font-size: 14px; }
.result-wrong { color: rgba(192,57,43,0.9); }
.result-right { color: rgba(61,140,64,0.9); }
.result-text { color: rgba(255,255,255,0.6); }

.think { margin: 8px 20px 0; padding: 12px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
.think-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 3px; letter-spacing: 1px; }
.think-text { font-size: 14px; color: var(--gold); font-weight: 600; }

.footer { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 22px; }
.footer span { font-size: 13px; color: rgba(255,255,255,0.55); }
</style>
</head>
<body>
<div class="slide">
  <div class="top"><span>第三种错误：讨好型</span></div>

  <div class="header">
    <div class="header-label">X 青铜 · 试图让她满意，丢失框架</div>
    <div class="header-title">她说"你是不是渣男"，你说"我只对你好"</div>
  </div>

  <div class="card card-wrong">
    <span class="card-badge badge-wrong">X 青铜</span>
    <div class="card-title">你在试图说服她，你是好的</div>
    <div class="card-text">「我哪里渣了？我只对你好」——等于把判断标准给她，让她决定你好不好。</div>
    <div class="card-result result-wrong">
      <span class="result-icon">!</span>
      <span class="result-text">失去了主动权</span>
    </div>
  </div>

  <div class="card card-right">
    <span class="card-badge badge-right">V 王者</span>
    <div class="card-title">态度比解释更重要</div>
    <div class="card-text">「我是认真的人，你信不信随你」——我的态度在这里，信不信是你的事。</div>
    <div class="card-result result-right">
      <span class="result-icon">!</span>
      <span class="result-text">她知道了你的底线，反而更尊重你</span>
    </div>
  </div>

  <div class="think">
    <div class="think-label">思维升级</div>
    <div class="think-text">讨好 = 告诉她"我需要你认可" = 低价值</div>
  </div>

  <div class="footer">
    <span>废物测试测的不是你有没有问题，而是你稳不稳</span>
  </div>
</div>
</body>
</html>
