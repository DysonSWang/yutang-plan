<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>追爱AI - 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --abyss-950: #050510;
      --abyss-900: #0a0a1a;
      --abyss-800: #12122a;
      --brand-500: #00d4aa;
      --brand-400: #1affbd;
      --brand-neon: #00ffaa;
      --ocean-500: #0ea5e9;
      --pink-500: #ec4899;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--abyss-950);
      font-family: 'Noto Sans SC', sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    .bg-grid {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
    }
    .bg-grid::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, transparent 0%, var(--abyss-950) 70%);
    }
    .scanline {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0, 212, 170, 0.02) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 1;
    }
    .neon-glow {
      position: fixed;
      width: 300px; height: 300px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: pulse 3s ease-in-out infinite;
    }
    .neon-glow-1 { background: var(--brand-500); top: 20%; left: 10%; }
    .neon-glow-2 { background: var(--pink-500); bottom: 20%; right: 10%; animation-delay: 1.5s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }
    .login-container { position: relative; z-index: 2; width: 100%; max-width: 420px; }
    .logo-section { text-align: center; margin-bottom: 40px; }
    .logo-text {
      font-family: 'Orbitron', monospace;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.15em;
      background: linear-gradient(90deg, var(--brand-500), var(--brand-neon), var(--ocean-500));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px var(--brand-500);
      animation: glow-text 2s ease-in-out infinite alternate;
    }
    @keyframes glow-text {
      from { filter: drop-shadow(0 0 10px var(--brand-500)); }
      to { filter: drop-shadow(0 0 20px var(--brand-neon)); }
    }
    .logo-subtitle { font-size: 12px; color: var(--brand-500); letter-spacing: 0.5em; margin-top: 8px; opacity: 0.7; }
    .neon-card {
      position: relative;
      background: rgba(10, 10, 26, 0.9);
      border: 1px solid rgba(0, 212, 170, 0.3);
      border-radius: 4px;
      padding: 40px;
      box-shadow: 0 0 20px rgba(0, 212, 170, 0.1), inset 0 0 60px rgba(0, 212, 170, 0.03);
    }
    .neon-corner { position: absolute; width: 20px; height: 20px; }
    .neon-corner::before, .neon-corner::after { content: ''; position: absolute; background: var(--brand-500); box-shadow: 0 0 10px var(--brand-500); }
    .neon-corner.tl { top: -1px; left: -1px; }
    .neon-corner.tl::before { width: 20px; height: 2px; top: 0; left: 0; }
    .neon-corner.tl::after { width: 2px; height: 20px; top: 0; left: 0; }
    .neon-corner.tr { top: -1px; right: -1px; }
    .neon-corner.tr::before { width: 20px; height: 2px; top: 0; right: 0; }
    .neon-corner.tr::after { width: 2px; height: 20px; top: 0; right: 0; }
    .neon-corner.bl { bottom: -1px; left: -1px; }
    .neon-corner.bl::before { width: 20px; height: 2px; bottom: 0; left: 0; }
    .neon-corner.bl::after { width: 2px; height: 20px; bottom: 0; left: 0; }
    .neon-corner.br { bottom: -1px; right: -1px; }
    .neon-corner.br::before { width: 20px; height: 2px; bottom: 0; right: 0; }
    .neon-corner.br::after { width: 2px; height: 20px; bottom: 0; right: 0; }
    .title-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid rgba(0, 212, 170, 0.2); }
    .title-bar h2 { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 500; color: var(--brand-500); letter-spacing: 0.2em; text-transform: uppercase; }
    .status-dot { width: 8px; height: 8px; background: var(--brand-500); border-radius: 50%; box-shadow: 0 0 10px var(--brand-500); animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .tab-group { display: flex; gap: 4px; margin-bottom: 28px; }
    .tab-item { flex: 1; padding: 10px; background: transparent; border: 1px solid rgba(0, 212, 170, 0.3); color: rgba(0, 212, 170, 0.5); font-family: 'Orbitron', monospace; font-size: 12px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s ease; }
    .tab-item:first-child { border-radius: 2px 0 0 2px; }
    .tab-item:last-child { border-radius: 0 2px 2px 0; }
    .tab-item.active { background: rgba(0, 212, 170, 0.2); border-color: var(--brand-500); color: var(--brand-500); box-shadow: 0 0 15px rgba(0, 212, 170, 0.3); }
    .tab-item:hover:not(.active) { background: rgba(0, 212, 170, 0.1); color: var(--brand-500); }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 11px; color: rgba(0, 212, 170, 0.6); margin-bottom: 8px; letter-spacing: 0.15em; font-family: 'Orbitron', monospace; }
    .form-input { width: 100%; padding: 14px 16px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 212, 170, 0.2); border-radius: 2px; color: var(--brand-neon); font-size: 14px; font-family: inherit; transition: all 0.3s ease; }
    .form-input::placeholder { color: rgba(0, 212, 170, 0.3); }
    .form-input:hover { border-color: rgba(0, 212, 170, 0.4); }
    .form-input:focus { outline: none; border-color: var(--brand-500); box-shadow: 0 0 15px rgba(0, 212, 170, 0.3), inset 0 0 15px rgba(0, 212, 170, 0.05); }
    .submit-btn { width: 100%; padding: 16px; background: transparent; border: 2px solid var(--brand-500); color: var(--brand-500); font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 500; letter-spacing: 0.2em; cursor: pointer; transition: all 0.3s ease; margin-top: 8px; position: relative; overflow: hidden; }
    .submit-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, var(--brand-500), transparent); transition: left 0.5s ease; }
    .submit-btn:hover::before { left: 100%; }
    .submit-btn:hover { background: var(--brand-500); color: var(--abyss-950); box-shadow: 0 0 30px var(--brand-500); }
    .footer-hint { text-align: center; margin-top: 24px; font-size: 12px; color: rgba(0, 212, 170, 0.4); }
    .footer-link { color: var(--brand-500); text-decoration: none; cursor: pointer; transition: all 0.3s ease; }
    .footer-link:hover { text-shadow: 0 0 10px var(--brand-500); }
    .hidden { display: none; }
    @media (max-width: 480px) { .neon-card { padding: 32px 24px; } .logo-text { font-size: 28px; } }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="scanline"></div>
  <div class="neon-glow neon-glow-1"></div>
  <div class="neon-glow neon-glow-2"></div>
  <div class="login-container">
    <div class="logo-section">
      <h1 class="logo-text">ZHUIAI</h1>
      <p class="logo-subtitle">追爱AI</p>
    </div>
    <div class="neon-card">
      <div class="neon-corner tl"></div>
      <div class="neon-corner tr"></div>
      <div class="neon-corner bl"></div>
      <div class="neon-corner br"></div>
      <div class="title-bar">
        <h2>Access Portal</h2>
        <div class="status-dot"></div>
      </div>
      <div class="tab-group">
        <button class="tab-item active" id="tab-login">LOGIN</button>
        <button class="tab-item" id="tab-register">REGISTER</button>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">USERNAME</label>
          <input type="text" class="form-input" placeholder="Enter username" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input type="password" class="form-input" placeholder="Enter password" autocomplete="current-password">
        </div>
        <button type="submit" class="submit-btn">ENTER</button>
      </form>
      <form id="register-form" class="hidden">
        <div class="form-group">
          <label class="form-label">USERNAME</label>
          <input type="text" class="form-input" placeholder="Set username" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">NICKNAME</label>
          <input type="text" class="form-input" placeholder="Set nickname (optional)">
        </div>
        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <input type="password" class="form-input" placeholder="Set password (min 8 chars)" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">INVITE CODE</label>
          <input type="text" class="form-input" placeholder="Invite code (optional)">
        </div>
        <button type="submit" class="submit-btn">REGISTER</button>
      </form>
      <div class="footer-hint" id="footer-hint">No account? <span class="footer-link" id="switch-link">Register now</span></div>
    </div>
  </div>
  <script>
    var tabLogin = document.getElementById('tab-login');
    var tabRegister = document.getElementById('tab-register');
    var loginForm = document.getElementById('login-form');
    var registerForm = document.getElementById('register-form');
    var footerHint = document.getElementById('footer-hint');
    var switchLink = document.getElementById('switch-link');
    var isLogin = true;
    function switchTab(toLogin) {
      isLogin = toLogin;
      if (toLogin) {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        footerHint.innerHTML = 'No account? <span class="footer-link" id="switch-link">Register now</span>';
      } else {
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        footerHint.innerHTML = 'Has account? <span class="footer-link" id="switch-link">Login now</span>';
      }
      document.getElementById('switch-link').onclick = function() { switchTab(isLogin); };
    }
    tabLogin.onclick = function() { switchTab(true); };
    tabRegister.onclick = function() { switchTab(false); };
    switchLink.onclick = function() { switchTab(!isLogin); };
    loginForm.onsubmit = function(e) { e.preventDefault(); alert('Login demo'); };
    registerForm.onsubmit = function(e) { e.preventDefault(); alert('Register demo'); };
  </script>
</body>
</html>
