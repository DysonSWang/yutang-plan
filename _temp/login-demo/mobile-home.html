<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>追AI - 首页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --abyss-950: #0a0f1a;
      --abyss-900: #0f172a;
      --abyss-800: #1e293b;
      --abyss-700: #334155;
      --abyss-600: #475569;
      --abyss-500: #64748b;
      --abyss-400: #94a3b8;
      --abyss-300: #cbd5e1;
      --brand-500: #00d4aa;
      --brand-400: #1affbd;
      --brand-glow: rgba(0, 212, 170, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      background: var(--abyss-950);
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      min-height: 100vh;
      min-height: 100dvh;
      padding-bottom: 80px;
    }

    /* 顶部状态栏 */
    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      background: var(--abyss-950);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .status-bar-time {
      font-size: 14px;
      font-weight: 500;
      color: white;
    }

    /* 主内容 */
    .main-content {
      padding-top: 44px;
      min-height: 100vh;
    }

    /* 背景光晕 */
    .bg-glow {
      position: fixed;
      top: -100px;
      right: -80px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,170,0.15) 0%, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
    }

    /* Logo 头部 */
    .header {
      position: relative;
      z-index: 1;
      padding: 16px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--brand-500), var(--brand-400));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px var(--brand-glow);
    }

    .logo-icon svg {
      width: 22px;
      height: 22px;
      fill: var(--abyss-950);
    }

    .logo-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--brand-500);
      letter-spacing: 0.08em;
    }

    .notification-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }

    .notification-btn:active {
      background: rgba(255,255,255,0.08);
      transform: scale(0.95);
    }

    .notification-btn svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: var(--abyss-400);
      stroke-width: 2;
    }

    .notification-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      background: #f87171;
      border-radius: 50%;
    }

    /* 欢迎区域 */
    .welcome-section {
      position: relative;
      z-index: 1;
      padding: 0 20px 16px;
    }

    .welcome-title {
      font-size: 24px;
      font-weight: 600;
      color: white;
      margin-bottom: 4px;
    }

    .welcome-subtitle {
      font-size: 13px;
      color: var(--abyss-500);
    }

    /* 会员卡 */
    .member-card {
      position: relative;
      z-index: 1;
      margin: 0 20px 16px;
      padding: 16px;
      background: rgba(0,212,170,0.06);
      border: 1px solid rgba(0,212,170,0.15);
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .member-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .member-badge {
      padding: 6px 12px;
      background: linear-gradient(135deg, var(--brand-500), var(--brand-400));
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--abyss-950);
    }

    .member-points {
      display: flex;
      flex-direction: column;
    }

    .points-label {
      font-size: 11px;
      color: var(--abyss-500);
    }

    .points-value {
      font-size: 16px;
      font-weight: 600;
      color: white;
    }

    .member-action {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid rgba(0,212,170,0.3);
      border-radius: 8px;
      font-size: 12px;
      color: var(--brand-500);
      cursor: pointer;
      transition: all 0.2s;
    }

    .member-action:active {
      background: rgba(0,212,170,0.1);
      transform: scale(0.98);
    }

    /* 进度阶段 */
    .progress-section {
      position: relative;
      z-index: 1;
      margin: 0 20px 20px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: white;
      margin-bottom: 12px;
    }

    .progress-track {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      padding: 0 4px;
    }

    .progress-line {
      position: absolute;
      top: 16px;
      left: 24px;
      right: 24px;
      height: 2px;
      background: rgba(255,255,255,0.1);
    }

    .progress-line-fill {
      position: absolute;
      top: 16px;
      left: 24px;
      width: 40%;
      height: 2px;
      background: linear-gradient(90deg, var(--brand-500), var(--brand-400));
    }

    .stage-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .stage-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--abyss-800);
      border: 2px solid var(--abyss-600);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      margin-bottom: 8px;
      transition: all 0.3s;
    }

    .stage-item.active .stage-dot {
      background: linear-gradient(135deg, var(--brand-500), var(--brand-400));
      border-color: var(--brand-500);
      box-shadow: 0 0 20px var(--brand-glow);
    }

    .stage-item.completed .stage-dot {
      background: var(--brand-500);
      border-color: var(--brand-500);
    }

    .stage-name {
      font-size: 11px;
      color: var(--abyss-500);
      text-align: center;
    }

    .stage-item.active .stage-name {
      color: var(--brand-500);
      font-weight: 500;
    }

    /* 统计卡片 */
    .stats-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 0 20px 20px;
    }

    .stat-card {
      padding: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      transition: all 0.2s;
    }

    .stat-card:active {
      background: rgba(255,255,255,0.05);
      transform: scale(0.98);
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(0,212,170,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .stat-icon svg {
      width: 18px;
      height: 18px;
      fill: var(--brand-500);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: white;
      margin-bottom: 2px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--abyss-500);
    }

    /* 快捷入口 */
    .quick-section {
      position: relative;
      z-index: 1;
      margin: 0 20px 20px;
    }

    .quick-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 4px;
    }

    .quick-scroll::-webkit-scrollbar {
      display: none;
    }

    .quick-card {
      flex-shrink: 0;
      width: 140px;
      padding: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .quick-card:active {
      background: rgba(0,212,170,0.06);
      border-color: rgba(0,212,170,0.2);
      transform: scale(0.97);
    }

    .quick-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(0,212,170,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .quick-icon svg {
      width: 20px;
      height: 20px;
      fill: var(--brand-500);
    }

    .quick-title {
      font-size: 14px;
      font-weight: 500;
      color: white;
      margin-bottom: 4px;
    }

    .quick-desc {
      font-size: 11px;
      color: var(--abyss-500);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10,15,26,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.06);
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .nav-items {
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 60px;
    }

    .nav-item:active {
      transform: scale(0.95);
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: var(--abyss-500);
      stroke-width: 1.5;
      margin-bottom: 4px;
    }

    .nav-item span {
      font-size: 10px;
      color: var(--abyss-500);
    }

    .nav-item.active svg {
      stroke: var(--brand-500);
    }

    .nav-item.active span {
      color: var(--brand-500);
    }

    /* 隐藏类 */
    .hidden { display: none; }
  </style>
</head>

    // 更新时间
    function updateTime() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('statusTime').textContent = `${hours}:${minutes}`;
    }
    updateTime();
    setInterval(updateTime, 1000);

        item.classList.remove('active');
      });
      el.classList.add('active');
