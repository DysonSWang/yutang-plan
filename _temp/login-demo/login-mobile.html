<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>追AI - 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --abyss-950: #0a0f1a;
      --abyss-900: #0f172a;
      --abyss-800: #1e293b;
      --abyss-700: #334155;
      --abyss-600: #475569;
      --abyss-500: #64748b;
      --abyss-400: #94a3b8;
      --abyss-300: #cbd5e1;
      --brand-500: #00d4aa;
      --brand-400: #1affbd;
      --brand-glow: rgba(0, 212, 170, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--abyss-950);
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 背景光晕 */
    .bg-glow {
      position: fixed;
      top: -150px;
      right: -100px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,170,0.18) 0%, transparent 70%);
      filter: blur(80px);
      pointer-events: none;
      animation: float1 8s ease-in-out infinite;
    }

    .bg-glow-2 {
      position: fixed;
      bottom: -80px;
      left: -80px;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
      animation: float2 10s ease-in-out infinite reverse;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(15px, -15px); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-15px, 15px); }
    }

    /* 主容器 */
    .main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      padding-bottom: 0;
      max-height: 100vh;
      max-height: 100dvh;
      overflow: hidden;
    }

    /* Logo 区域 */
    .logo-section {
      text-align: center;
      padding: 20px 0 16px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, var(--brand-500), var(--brand-400));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px var(--brand-glow);
    }

    .logo-icon svg {
      width: 30px;
      height: 30px;
      fill: var(--abyss-950);
    }

    .logo-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 600;
      color: white;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }

    .logo-subtitle {
      font-size: 11px;
      color: var(--abyss-500);
      letter-spacing: 0.35em;
    }

    /* 表单区域 */
    .form-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* 玻璃卡片 */
    .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 24px 20px;
      position: relative;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* 右上角装饰 */
    .corner-accent {
      position: absolute;
      width: 50px;
      height: 50px;
      pointer-events: none;
    }

    .corner-accent.top-right {
      top: -1px;
      right: -1px;
      border-top: 1px solid var(--brand-500);
      border-right: 1px solid var(--brand-500);
      border-top-right-radius: 20px;
      opacity: 0.5;
    }

    /* 标题区 */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: white;
      letter-spacing: 0.05em;
    }

    .settings-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: transparent;
      border: none;
      color: var(--abyss-500);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .settings-btn:active {
      background: rgba(255, 255, 255, 0.08);
      color: var(--abyss-300);
    }

    /* 输入框组 */
    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      display: block;
      font-size: 11px;
      color: var(--abyss-500);
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-family: inherit;
      transition: all 0.25s ease;
      outline: none;
    }

    .input-field::placeholder {
      color: var(--abyss-600);
    }

    .input-field:hover {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.07);
    }

    .input-field:focus {
      border-color: var(--brand-500);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 0 0 3px var(--brand-glow);
    }

    /* 错误提示 */
    .error-msg {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #f87171;
    }

    /* 提交按钮 */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--brand-500), var(--brand-400));
      border: none;
      border-radius: 12px;
      color: var(--abyss-950);
      font-size: 16px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 4px;
      box-shadow: 0 4px 16px var(--brand-glow);
    }

    .submit-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px var(--brand-glow);
    }

    /* 伪装按钮 */
    .disguise-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      color: var(--abyss-500);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
    }

    .disguise-btn:active {
      background: rgba(255, 255, 255, 0.04);
      color: var(--abyss-400);
    }

    /* 底部提示 */
    .footer-hint {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--abyss-600);
      flex-shrink: 0;
    }

    /* 设置面板 */
    .settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 200px;
      background: var(--abyss-900);
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      padding: 20px 16px;
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }

    .settings-panel.open {
      transform: translateX(0);
    }

    .settings-panel-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--abyss-200);
      margin-bottom: 20px;
    }

    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .settings-item-label {
      font-size: 13px;
      color: white;
    }

    .settings-item-desc {
      font-size: 10px;
      color: var(--abyss-500);
      margin-top: 2px;
    }

    /* 开关 */
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 26px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--abyss-700);
      border-radius: 13px;
      transition: 0.3s;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: var(--brand-500);
    }

    .toggle-switch input:checked + .toggle-slider:before {
      transform: translateX(18px);
    }

    /* 遮罩 */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* 记事本页面 */
    .notepad-page {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .notepad-page.active {
      display: flex;
    }

    .notepad-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .notepad-text {
      color: var(--abyss-500);
      font-size: 14px;
    }

    .login-page {
      display: none;
    }

    .login-page.active {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* 键盘适配 */
    @media (max-height: 600px) {
      .logo-section {
        padding: 12px 0 10px;
      }
      .logo-icon {
        width: 44px;
        height: 44px;
      }
      .glass-card {
        padding: 18px 16px;
      }
      .input-group {
        margin-bottom: 12px;
      }
    }

    @media (min-height: 800px) {
      .logo-section {
        padding: 32px 0 20px;
      }
      .form-section {
        padding-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow-2"></div>
  <div class="overlay" id="overlay" onclick="closeSettings()"></div>

  <!-- 设置面板 -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-panel-header">设置</div>
    <div class="settings-item">
      <div>
        <div class="settings-item-label">伪装模式</div>
        <div class="settings-item-desc">开启后显示为记事本</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="disguiseToggle" onchange="toggleDisguise(this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- 登录页 -->
  <div class="main login-page active" id="loginPage">
    <div class="logo-section">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </div>
      <h1 class="logo-title">追 AI</h1>
      <p class="logo-subtitle">PURSUIT OF AI</p>
    </div>

    <div class="form-section">
      <div class="glass-card">
        <div class="corner-accent top-right"></div>

        <div class="card-header">
          <span class="card-title" id="pageTitle">登录</span>
          <button class="settings-btn" onclick="openSettings()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>

        <div id="errorBox" class="error-msg" style="display:none;"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="input-group">
            <label class="input-label">用户名</label>
            <input
              type="text"
              class="input-field"
              id="usernameInput"
              placeholder="请输入用户名"
              autocomplete="username"
              autocapitalize="none"
            >
          </div>
          <div class="input-group">
            <label class="input-label">密码</label>
            <input
              type="password"
              class="input-field"
              id="passwordInput"
              placeholder="请输入密码"
              autocomplete="current-password"
            >
          </div>
          <button type="submit" class="submit-btn" id="submitBtn">登录</button>
          <button type="button" class="disguise-btn" id="disguiseBtn" onclick="showNotepad()">记事本</button>
        </form>
      </div>
    </div>

    <div class="footer-hint">如需账号请联系管理员创建</div>
  </div>

  <!-- 记事本页 -->
  <div class="notepad-page" id="notepadPage">
    <div class="notepad-icon">📝</div>
    <div class="notepad-text">记事本功能开发中...</div>
    <button class="disguise-btn" style="margin-top: 24px;" onclick="showLogin()">登录</button>
  </div>

  <script>
    const loginPage = document.getElementById('loginPage');
    const notepadPage = document.getElementById('notepadPage');
    const settingsPanel = document.getElementById('settingsPanel');
    const overlay = document.getElementById('overlay');
    const pageTitle = document.getElementById('pageTitle');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');
    const disguiseBtn = document.getElementById('disguiseBtn');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const disguiseToggle = document.getElementById('disguiseToggle');

    let disguiseMode = localStorage.getItem('zhuiai_disguise') === 'true';

    function init() {
      disguiseToggle.checked = disguiseMode;
      if (disguiseMode) {
        showNotepad();
      }
    }

    function openSettings() {
      settingsPanel.classList.add('open');
      overlay.classList.add('open');
    }

    function closeSettings() {
      settingsPanel.classList.remove('open');
      overlay.classList.remove('open');
    }

    function toggleDisguise(enabled) {
      disguiseMode = enabled;
      localStorage.setItem('zhuiai_disguise', enabled ? 'true' : 'false');
      if (enabled) {
        showNotepad();
      } else {
        showLogin();
      }
    }

    function showNotepad() {
      loginPage.classList.remove('active');
      notepadPage.classList.add('active');
      pageTitle.textContent = '记事本';
      closeSettings();
    }

    function showLogin() {
      notepadPage.classList.remove('active');
      loginPage.classList.add('active');
      pageTitle.textContent = '登录';
      closeSettings();
    }

    function handleLogin(e) {
      e.preventDefault();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }

      hideError();
      submitBtn.textContent = '登录中...';
      submitBtn.disabled = true;

      // 模拟登录
      setTimeout(() => {
        submitBtn.textContent = '登录';
        submitBtn.disabled = false;
        showError('登录功能演示模式');
      }, 1000);
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
    }

    function hideError() {
      errorBox.style.display = 'none';
    }

    // 实时清除错误
    usernameInput.oninput = hideError;
    passwordInput.oninput = hideError;

    // 回车提交
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        handleLogin(e);
      }
    });

    // 输入框获得焦点时清除错误
    [usernameInput, passwordInput].forEach(input => {
      input.addEventListener('focus', hideError);
    });

    init();
  </script>
</body>
</html>
